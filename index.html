<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cities of Ladies</title>
  <meta name="description" content="VR Video Player for Cities of Ladies">

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">

  <script src="lib/aframe.min.js"></script>
  <link rel="stylesheet" href="lib/fonts.css">
  <style>
    body { margin: 0; overflow: hidden; }
    #video-menu {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 999;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 10px;
      color: white;
      font-family: Arial, sans-serif;
      transition: opacity 0.3s;
    }
    #video-menu.hidden { opacity: 0; pointer-events: none; }
    #video-menu h3 { margin: 0 0 5px 0; cursor: pointer; padding: 8px; border-radius: 5px; font-size: 16px; }
    #video-menu h3:hover { background: rgba(255,255,255,0.1); }
    #video-menu h3.active { background: #e91e63; }
    .folder-section { display: none; margin-left: 10px; border-left: 2px solid #e91e63; padding-left: 10px; margin-bottom: 10px; }
    .folder-section.active { display: block; }
    #video-menu button {
      display: block; width: 100%;
      padding: 8px; margin: 3px 0;
      background: #444; border: none;
      color: white; border-radius: 5px;
      cursor: pointer; font-size: 13px; text-align: left;
    }
    #video-menu button:hover { background: #666; }
    #hint {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      color: white; font-family: Arial; font-size: 16px;
      z-index: 998;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px; border-radius: 5px;
      transition: opacity 0.5s;
    }
    #hint.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <!-- Plain <video> element — kept OUTSIDE a-assets deliberately so
       A-Frame never tries to pre-process it as an asset texture. -->
  <video id="vid" crossorigin="anonymous" playsinline
         style="display:none" preload="none"></video>

  <div id="video-menu">
    <h3 onclick="showFolder(0)" id="folder-0" class="active">WE</h3>
    <div id="section-0" class="folder-section active">
      <button onclick="playVideo(0)">01 - Cities of Ladies (WE)</button>
      <button onclick="playVideo(1)">02 - Cities of Ladies (WE)</button>
    </div>
    <h3 onclick="showFolder(1)" id="folder-1">YOU</h3>
    <div id="section-1" class="folder-section">
      <button onclick="playVideo(2)">01 - Cities of Ladies (YOU)</button>
      <button onclick="playVideo(3)">02 - Cities of Ladies (YOU)</button>
    </div>
    <h3 onclick="showFolder(2)" id="folder-2">I</h3>
    <div id="section-2" class="folder-section">
      <button onclick="playVideo(4)">01 - Cities of Ladies (I)</button>
      <button onclick="playVideo(5)">02 - Cities of Ladies (I)</button>
    </div>
    <button onclick="stopVideo()" style="background:#555;margin-top:10px;">&#9632; STOP</button>
  </div>

  <div id="hint">Select a video to begin</div>

  <a-scene vr-mode-ui="enabled: true"
           renderer="colorManagement: true"
           webxr="optionalFeatures: local-floor, bounded-floor, hand-tracking, layers">

    <!-- a-sky with no src — we'll inject the Three.js VideoTexture directly -->
    <a-sky id="sky" color="#000"></a-sky>

    <a-camera position="0 1.6 0">
      <a-cursor color="white"></a-cursor>
    </a-camera>

  </a-scene>

  <script>
    const VIDEOS = [
      "01 Cities of Ladies (WE)/01 CITY OF LADIES 2 (WE).mp4",
      "01 Cities of Ladies (WE)/02 CITY OF LADIES 2 (WE).mp4",
      "02 Cities of Ladies (YOU)/01 CITY OF LADIES 2 (YOU).mp4",
      "02 Cities of Ladies (YOU)/02 CITY OF LADIES 2 (YOU).mp4",
      "03 Cities of Ladies (I)/01 CITIES OF LADIES 3 (I).mp4",
      "03 Cities of Ladies (I)/02 CITIES OF LADIES 3 (I).mp4"
    ];

    const vidEl   = document.getElementById("vid");
    const skyEl   = document.getElementById("sky");
    const menu    = document.getElementById("video-menu");
    const hint    = document.getElementById("hint");
    let isPlaying = false;
    let videoTexture = null;

    // ── inject VideoTexture straight into Three.js mesh ───────────────────────
    function applyVideoTexture() {
      const THREE = AFRAME.THREE;

      // Dispose previous texture to free GPU memory
      if (videoTexture) {
        videoTexture.dispose();
        videoTexture = null;
      }

      videoTexture = new THREE.VideoTexture(vidEl);
      videoTexture.minFilter = THREE.LinearFilter;
      videoTexture.magFilter = THREE.LinearFilter;
      videoTexture.format    = THREE.RGBAFormat;
      videoTexture.generateMipmaps = false;

      // Walk the sky entity's Three.js object and set map on every material found
      skyEl.object3D.traverse(function (node) {
        if (node.isMesh) {
          node.material.map = videoTexture;
          node.material.color.set(0xffffff); // clear the fallback #000 color
          node.material.needsUpdate = true;
        }
      });
    }

    // ── folder accordion ──────────────────────────────────────────────────────
    function showFolder(i) {
      for (let j = 0; j < 3; j++) {
        document.getElementById("folder-" + j).classList.remove("active");
        document.getElementById("section-" + j).classList.remove("active");
      }
      document.getElementById("folder-" + i).classList.add("active");
      document.getElementById("section-" + i).classList.add("active");
    }

    function showMenu() { menu.classList.remove("hidden"); }
    function hideMenu() { menu.classList.add("hidden"); }

    // ── play ──────────────────────────────────────────────────────────────────
    function playVideo(index) {
      vidEl.pause();
      vidEl.src = VIDEOS[index];
      vidEl.load();

      vidEl.addEventListener("canplay", function onReady() {
        vidEl.removeEventListener("canplay", onReady);

        // Scene must be loaded before we can touch Three.js objects
        const scene = document.querySelector("a-scene");
        function doApply() {
          applyVideoTexture();
          vidEl.play().then(() => {
            isPlaying = true;
            hideMenu();
            hint.textContent = "Tap or press a button to show menu";
            hint.classList.remove("hidden");
            setTimeout(() => hint.classList.add("hidden"), 3000);
            setTimeout(() => { if (scene.enterVR) scene.enterVR(); }, 500);
          }).catch(err => {
            console.error("Play error:", err);
            isPlaying = false;
            showMenu();
          });
        }

        if (scene.hasLoaded) {
          doApply();
        } else {
          scene.addEventListener("loaded", doApply, { once: true });
        }
      });
    }

    // ── stop ──────────────────────────────────────────────────────────────────
    function stopVideo() {
      vidEl.pause();
      vidEl.src = "";
      isPlaying = false;
      clearTimeout(window._menuHideTimer);
      // Reset sky to black
      skyEl.object3D.traverse(function (node) {
        if (node.isMesh) {
          if (videoTexture) { videoTexture.dispose(); videoTexture = null; }
          node.material.map = null;
          node.material.color.set(0x000000);
          node.material.needsUpdate = true;
        }
      });
      showMenu();
      hint.classList.add("hidden");
    }

    // ── video events ──────────────────────────────────────────────────────────
    vidEl.addEventListener("ended", () => { isPlaying = false; showMenu(); hint.classList.add("hidden"); });
    vidEl.addEventListener("error", () => { isPlaying = false; showMenu(); console.error("Video error:", vidEl.error); });

    // ── show menu on interaction ──────────────────────────────────────────────
    function showMenuTemporarily() {
      showMenu();
      if (isPlaying) {
        clearTimeout(window._menuHideTimer);
        window._menuHideTimer = setTimeout(() => { if (isPlaying) hideMenu(); }, 5000);
      }
    }

    let pointerDown = null, dragging = false;
    document.addEventListener("mousedown",  e => { pointerDown = {x:e.clientX, y:e.clientY}; dragging = false; });
    document.addEventListener("touchstart", e => { const t=e.touches[0]; pointerDown={x:t.clientX,y:t.clientY}; dragging=false; }, {passive:true});
    document.addEventListener("mousemove",  e => { if (pointerDown && (Math.abs(e.clientX-pointerDown.x)>5||Math.abs(e.clientY-pointerDown.y)>5)) dragging=true; });
    document.addEventListener("touchmove",  e => { if (pointerDown){const t=e.touches[0];if(Math.abs(t.clientX-pointerDown.x)>5||Math.abs(t.clientY-pointerDown.y)>5)dragging=true;}},{passive:true});
    document.addEventListener("mouseup",    e => { if (!dragging && e.button===0) showMenuTemporarily(); pointerDown=null; });
    document.addEventListener("touchend",   () => { if (!dragging) showMenuTemporarily(); pointerDown=null; });
    document.addEventListener("keydown",    () => showMenuTemporarily());

    // VR controllers
    const VR_BUTTONS = ["abuttondown","bbuttondown","xbuttondown","ybuttondown","triggerdown","gripdown","menudown"];
    function attachVR(el) { VR_BUTTONS.forEach(ev => el.addEventListener(ev, showMenuTemporarily)); }
    document.querySelector("a-scene").addEventListener("controllerconnected", e => attachVR(e.detail.component.el));

    // Tab visibility
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) { if (isPlaying) vidEl.pause(); }
      else { if (isPlaying) vidEl.play().catch(()=>{}); }
    });
  </script>
</body>
</html>
